services:
  frontend:
    build: ./frontend
    container_name: campuseats-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - campuseats
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: campuseats-backend
    restart: unless-stopped
    ports:
      - "3333:3333"
    environment:
      - DATABASE_URI=mongodb://mongo:27017/campuseats
      - CORS_ORIGIN=http://localhost:5173
      - PORT=3333
    networks:
      - campuseats
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    build: ./mongo
    container_name: campuseats-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=campuseats
    networks:
      - campuseats
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/campuseats --quiet
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  campuseats:
    driver: bridge

volumes:
  mongo-data:
    driver: local
