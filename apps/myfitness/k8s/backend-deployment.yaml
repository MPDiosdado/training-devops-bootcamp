apiVersion: apps/v1
kind: Deployment
metadata:
  name: myfitness-backend
  labels:
    app: myfitness-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myfitness-backend
  template:
    metadata:
      labels:
        app: myfitness-backend
    spec:
      containers:
        - name: myfitness-backend
          image: myfitness-backend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
