<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizBattle - Resultados</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --accent: #6c5ce7; --green: #00b894; --bg: #0f0f13; --card: #1a1a24; --border: #2a2a3a; --text: #f0f0f5; --dim: #6b6b80; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 2rem 1rem; }
    .shell { max-width: 600px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; }
    .header h1 span { color: var(--accent); }
    .header .total { display: inline-block; margin-top: 0.5rem; background: var(--card); border: 1px solid var(--border); border-radius: 100px; padding: 0.4rem 1rem; font-size: 0.85rem; color: var(--green); font-weight: 700; }
    .header .live { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--green); margin-right: 0.4rem; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .q-result { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.25rem; }
    .q-result h2 { font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
    .bar-row { margin-bottom: 0.6rem; }
    .bar-label { display: flex; justify-content: space-between; font-size: 0.82rem; font-weight: 600; margin-bottom: 0.3rem; }
    .bar-label .pct { color: var(--accent); }
    .bar-track { height: 32px; background: var(--bg); border-radius: 10px; overflow: hidden; position: relative; }
    .bar-fill { height: 100%; border-radius: 10px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); display: flex; align-items: center; padding-left: 0.75rem; font-size: 0.78rem; font-weight: 700; color: white; min-width: 0; }
    .bar-fill.c0 { background: linear-gradient(135deg, #6c5ce7, #a29bfe); }
    .bar-fill.c1 { background: linear-gradient(135deg, #00b894, #55efc4); }
    .bar-fill.c2 { background: linear-gradient(135deg, #fd79a8, #e84393); }
    .bar-fill.c3 { background: linear-gradient(135deg, #fdcb6e, #e17055); }
    .no-votes { text-align: center; color: var(--dim); padding: 1rem; font-size: 0.88rem; }
    footer { text-align: center; margin-top: 2rem; font-size: 0.75rem; color: var(--dim); }
  </style>
</head>
<body>
<div class="shell">
  <div class="header">
    <h1>📊 Quiz<span>Battle</span></h1>
    <div class="total"><span class="live"></span> <span id="total">0</span> votos totales</div>
  </div>
  <div id="results"></div>
  <footer>QuizBattle &mdash; Bootcamp DevOps 2026 &mdash; Carlos Palanca</footer>
</div>

<script>
const QUESTIONS = [
  { id: "q1", question: "Mejor lenguaje para DevOps?", options: ["Python","Go","Bash","TypeScript"] },
  { id: "q2", question: "Mejor orquestador de contenedores?", options: ["Kubernetes","Docker Swarm","Nomad","ECS"] },
  { id: "q3", question: "Mejor herramienta de IaC?", options: ["Terraform","Pulumi","CloudFormation","Ansible"] },
  { id: "q4", question: "Mejor CI/CD?", options: ["GitHub Actions","GitLab CI","Jenkins","ArgoCD"] },
];

async function refresh() {
  try {
    const [resR, resT] = await Promise.all([
      fetch('/api/results').then(r => r.json()),
      fetch('/api/total').then(r => r.json()),
    ]);
    document.getElementById('total').textContent = resT.total || 0;
    const container = document.getElementById('results');
    container.innerHTML = QUESTIONS.map(q => {
      const data = resR[q.id] || {};
      const total = Object.values(data).reduce((s,v) => s + v, 0);
      return `
        <div class="q-result">
          <h2>${q.question}</h2>
          ${total === 0 ? '<div class="no-votes">Esperando votos...</div>' :
            q.options.map((opt, i) => {
              const count = data[opt] || 0;
              const pct = total > 0 ? Math.round(count / total * 100) : 0;
              return `
                <div class="bar-row">
                  <div class="bar-label"><span>${opt}</span><span class="pct">${count} (${pct}%)</span></div>
                  <div class="bar-track"><div class="bar-fill c${i}" style="width:${Math.max(pct, 2)}%">${pct > 10 ? pct + '%' : ''}</div></div>
                </div>`;
            }).join('')
          }
        </div>`;
    }).join('');
  } catch { }
}

refresh();
setInterval(refresh, 2000);
</script>
</body>
</html>
