services:
  backend:
    build:
      context: ../myfitness/backend
      dockerfile: Dockerfile
    container_name: myfitness-backend
    restart: unless-stopped
    environment:
      PORT: 3001
    ports:
      - "${BACKEND_PORT:-3001}:3001"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - myfitness-network

  frontend:
    build:
      context: ../myfitness/frontend
      dockerfile: Dockerfile
    container_name: myfitness-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - myfitness-network

volumes:
  backend_data:

networks:
  myfitness-network:
    driver: bridge
